<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/main.js" defer></script>
</head>
<body class="bg-red-500 flex flex-col items-center justify-center h-screen gap-4">
    <h1 class="text-2xl">Lista produtos</h1>

    <input 
        class="border py-2 px4 rounded" 
        type="text"
        id="codigo"
        placeholder="Codigo"
    >

    <input 
        class="border py-2 px4 rounded" 
        type="text"
        id="produto"
        placeholder="Produto"
    >

    <input 
        class="border py-2 px4 rounded" 
        type="text"
        id="quantidade"
        placeholder="Quantidade"
    >

    <button 
        class="bg-yellow-500 text-white border py-2 px4 rounded"
        onclick="adicionarProduto()">
        Adicionar
    </button>

    <div id="lista" class="flex flex-col gap-2"></div>
</body>
</html>
